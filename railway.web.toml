# railway.web.toml — SyncSpace "web" service config (Caddy static + proxy).
#
# 이 파일은 Railway web 서비스를 위한 설정이다. Dockerfile.web으로 빌드하며
# 프런트엔드 정적 SPA를 Caddy로 서빙하고, API/A2A/realtime/health 경로를
# api 서비스로 reverse_proxy 한다.
#
# 적용 방법 / how to apply:
#   Railway > web service > Settings > Config-as-code path = railway.web.toml
#
# 중요 / important:
#   - API_INTERNAL_URL은 반드시 api 서비스의 private URL을 가리켜야 한다.
#     예) http://api.railway.internal:8080  (포트는 api 서비스의 PORT와 일치)
#   - healthcheckPath /health는 Caddy가 api로 프록시하므로, 사실상
#     web→api 경로 전체(프록시 포함)가 살아 있는지 확인한다.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.web"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
